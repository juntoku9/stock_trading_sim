<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PaperTrade Pro README hero</title>
  <desc id="desc">A dark trading education dashboard banner with a rising chart, lesson cards, portfolio stats, and the PaperTrade Pro name.</desc>
  <rect width="1200" height="420" rx="28" fill="#0A0A0A"/>
  <rect x="24" y="24" width="1152" height="372" rx="24" fill="#111111" stroke="#2A2A2A" stroke-width="2"/>
  <circle cx="1060" cy="84" r="120" fill="#22C55E" fill-opacity="0.08"/>
